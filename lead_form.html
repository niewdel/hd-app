<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request a Quote — HD Hauling & Grading</title>
<link rel="icon" type="image/png" href="/hd_logo_cropped.png"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --red:#CC0000;
    --red-dk:#A30000;
    --blk:#111;
    --gray:#5a5a5a;
    --gray-lt:#8a8a8a;
    --lgray:#f5f5f5;
    --bdr:#e3e3e3;
    --bdr-strong:#cfcfcf;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  html,body{background:transparent;color:var(--blk);font-family:var(--font);line-height:1.5;}

  /* ---------- Standalone-page chrome (only shown when NOT iframed) ---------- */
  .header{background:var(--blk);padding:16px 24px;display:flex;align-items:center;gap:12px;}
  .header img{height:36px;}
  .header span{color:#fff;font-size:14px;font-weight:600;letter-spacing:1px;}
  .container{max-width:680px;margin:32px auto;padding:0 16px;}
  body:not(.embed-mode){background:#f8f8f8;}
  .card{background:#fff;border:1px solid var(--bdr);border-radius:12px;overflow:hidden;}
  .card-hdr{padding:24px 28px 20px;border-bottom:1px solid var(--bdr);}

  /* ---------- Embed mode: strip page chrome, fill host width ---------- */
  body.embed-mode .header{display:none;}
  body.embed-mode .container{max-width:none;margin:0;padding:0;}
  body.embed-mode .card{border:none;border-radius:0;background:transparent;}
  body.embed-mode .card-hdr{border-bottom:1px solid var(--bdr);padding:0 0 20px;margin-bottom:8px;}
  body.embed-mode .card-body{padding:24px 0 8px;}

  /* ---------- Form content (shared) ---------- */
  .card-hdr h2{font-size:24px;font-weight:800;letter-spacing:-0.01em;line-height:1.2;}
  .card-hdr h2 .accent{color:var(--red);}
  .card-hdr p{font-size:14px;color:var(--gray);margin-top:6px;}
  .card-body{padding:24px 28px 28px;}

  .field{margin-top:18px;}
  .field:first-child{margin-top:0;}
  label{display:block;font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px;}
  .req{color:var(--red);margin-left:2px;}

  input,textarea,select{
    width:100%;
    padding:12px 14px;
    border:1px solid var(--bdr-strong);
    border-radius:6px;
    font-size:15px;
    font-family:var(--font);
    color:var(--blk);
    background:#fff;
    transition:border-color .15s, box-shadow .15s;
    -webkit-appearance:none;
    appearance:none;
  }
  input::placeholder,textarea::placeholder{color:#b0b0b0;}
  input:focus,textarea:focus,select:focus{
    outline:none;
    border-color:var(--red);
    box-shadow:0 0 0 3px rgba(204,0,0,0.12);
  }
  textarea{min-height:110px;resize:vertical;line-height:1.5;}

  select{
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%23666' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat:no-repeat;
    background-position:right 14px center;
    padding-right:36px;
  }

  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px;}
  .row2 .field{margin-top:0;}

  .btn-submit{
    display:block;
    width:100%;
    margin-top:24px;
    padding:15px 16px;
    background:var(--red);
    color:#fff;
    border:none;
    border-radius:6px;
    font-size:15px;
    font-weight:700;
    letter-spacing:0.4px;
    text-transform:uppercase;
    cursor:pointer;
    font-family:var(--font);
    transition:background .15s, transform .05s;
    box-shadow:0 1px 0 rgba(0,0,0,0.04);
  }
  .btn-submit:hover{background:var(--red-dk);}
  .btn-submit:active{transform:translateY(1px);}
  .btn-submit:disabled{opacity:.55;cursor:not-allowed;background:var(--red);}

  .err{color:var(--red);font-size:13px;margin-top:12px;font-weight:500;min-height:18px;}

  .privacy{font-size:12px;color:var(--gray-lt);text-align:center;margin-top:14px;line-height:1.4;}

  .success{text-align:center;padding:48px 24px;}
  .success-ic{width:56px;height:56px;border-radius:50%;background:#e8f5ec;color:#2e7d32;display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px;}
  .success h3{font-size:22px;font-weight:800;margin-bottom:8px;letter-spacing:-0.01em;}
  .success p{font-size:14px;color:var(--gray);max-width:380px;margin:0 auto;}

  @media(max-width:560px){
    .row2{grid-template-columns:1fr;gap:0;}
    .row2 .field{margin-top:18px;}
    .row2 .field:first-child{margin-top:0;}
    .container{margin:16px auto;padding:0 12px;}
    .card-hdr{padding:20px 20px 16px;}
    .card-body{padding:20px;}
    body.embed-mode .card-hdr{padding:0 0 16px;}
    body.embed-mode .card-body{padding:20px 0 8px;}
    .card-hdr h2{font-size:20px;}
  }
</style>
</head>
<body>
<header class="header">
  <img src="/hd_logo_cropped.png" alt="HD Hauling & Grading"/>
  <span>HD HAULING &amp; GRADING</span>
</header>

<div class="container">
  <div class="card" id="form-card">
    <div class="card-hdr">
      <h2>Request a <span class="accent">Free Quote</span></h2>
      <p>Tell us about your project and our team will reach out within one business day.</p>
    </div>
    <div class="card-body">
      <div class="field">
        <label for="lead-name">Your Name <span class="req">*</span></label>
        <input type="text" id="lead-name" placeholder="John Smith" autocomplete="name" required/>
      </div>

      <div class="row2">
        <div class="field">
          <label for="lead-company">Company <span class="req">*</span></label>
          <input type="text" id="lead-company" placeholder="ABC Properties" autocomplete="organization" required/>
        </div>
        <div class="field">
          <label for="lead-phone">Phone <span class="req">*</span></label>
          <input type="tel" id="lead-phone" placeholder="(555) 000-0000" autocomplete="tel" required/>
        </div>
      </div>

      <div class="field">
        <label for="lead-email">Email <span class="req">*</span></label>
        <input type="email" id="lead-email" placeholder="john@example.com" autocomplete="email" required/>
      </div>

      <div class="field">
        <label for="lead-address">Project Address <span class="req">*</span></label>
        <input type="text" id="lead-address" placeholder="123 Main St, Charlotte, NC" autocomplete="street-address" required/>
      </div>

      <div class="field">
        <label for="lead-desc">Tell us about your project <span class="req">*</span></label>
        <textarea id="lead-desc" placeholder="Brief description of the work needed — parking lot repair, new driveway, grading, etc." required></textarea>
      </div>

      <div class="field">
        <label for="lead-source">How did you hear about us? <span class="req">*</span></label>
        <select id="lead-source" required>
          <option value="">— Select —</option>
          <option value="Google">Google Search</option>
          <option value="Referral">Referral</option>
          <option value="Drive-by">Drove Past a Job Site</option>
          <option value="Social Media">Social Media</option>
          <option value="Repeat Customer">Repeat Customer</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div id="lead-err" class="err" role="alert" aria-live="polite"></div>
      <button class="btn-submit" id="btn-lead-submit" onclick="submitLead()">Submit Request</button>
      <p class="privacy">Your information is only used to follow up about your project. We never share or sell it.</p>
    </div>
  </div>
</div>

<script>
// Auto-detect iframe embed and strip page chrome
(function(){
  try {
    if (window.self !== window.top) {
      document.body.classList.add('embed-mode');
    }
  } catch (e) {
    // Cross-origin block on window.top access also means we're embedded
    document.body.classList.add('embed-mode');
  }
})();

// Post height to parent so the iframe can auto-resize (host opt-in)
function postHeight(){
  try {
    if (window.parent && window.parent !== window) {
      var h = document.documentElement.scrollHeight;
      window.parent.postMessage({type:'hd-leadform-height', height:h}, '*');
    }
  } catch(e){}
}
window.addEventListener('load', postHeight);
window.addEventListener('resize', postHeight);
new ResizeObserver(postHeight).observe(document.body);

function submitLead(){
  var err=document.getElementById('lead-err');
  var btn=document.getElementById('btn-lead-submit');
  err.textContent='';
  var name=document.getElementById('lead-name').value.trim();
  var company=document.getElementById('lead-company').value.trim();
  var phone=document.getElementById('lead-phone').value.trim();
  var email=document.getElementById('lead-email').value.trim();
  var address=document.getElementById('lead-address').value.trim();
  var desc=document.getElementById('lead-desc').value.trim();
  var source=document.getElementById('lead-source').value;
  if(!name||!company||!phone||!email||!address||!desc||!source){err.textContent='All fields are required.';return;}
  btn.disabled=true;btn.textContent='Submitting...';
  fetch('/leads/submit',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      name:name,
      company:company,
      phone:phone,
      email:email,
      address:address,
      description:desc,
      source:source
    })
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.ok){
      document.getElementById('form-card').innerHTML =
        '<div class="success">' +
          '<div class="success-ic"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>' +
          '<h3>Request Submitted</h3>' +
          '<p>Thanks, ' + name.split(' ')[0].replace(/[<>"]/g,'') + '. Our team will review your request and get back to you within one business day.</p>' +
        '</div>';
      postHeight();
    } else {
      err.textContent=d.error||'Something went wrong. Please try again.';
      btn.disabled=false;btn.textContent='Submit Request';
    }
  })
  .catch(function(){
    err.textContent='Network error. Please try again.';
    btn.disabled=false;btn.textContent='Submit Request';
  });
}
</script>
</body>
</html>
