<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>HD Hauling &amp; Grading — Sign In</title>
<link rel="icon" type="image/png" href="/hd-favicon.png"/>
<meta name="robots" content="noindex, nofollow"/>
<meta name="referrer" content="strict-origin-when-cross-origin"/>
<style>
  :root{--red:#CC0000;--font:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,sans-serif;}
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{background:#080808;font-family:var(--font);color:#fff;min-height:100vh;overflow:hidden;}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}

  #login-screen{position:fixed;inset:0;background:radial-gradient(circle at 50% 35%, #1a1a1d 0%, #080808 65%);z-index:1000;display:flex;flex-direction:column;overflow:hidden;}
  .login-body{position:relative;z-index:2;flex:1;display:flex;align-items:center;justify-content:center;padding:20px;}
  .login-card{width:540px;max-width:90vw;text-align:center;}
  .login-eyebrow{margin-bottom:18px;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .login-logo-img{width:180px;height:auto;}
  .login-sub{font-size:14px;color:rgba(255,255,255,0.3);letter-spacing:0.5px;margin-bottom:36px;}
  .login-rule{width:32px;height:2px;background:var(--red);margin:0 auto 36px;border-radius:2px;}
  .pin-input{width:100%;height:48px;padding:0 20px;text-align:center;font-size:16px;font-weight:700;letter-spacing:1.5px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:3px;color:#fff;margin-bottom:12px;font-family:var(--font);transition:border-color .2s,background .2s;}
  .pin-input:focus{border-color:var(--red);background:rgba(204,0,0,0.04);}
  .pin-input:focus:not(:focus-visible){outline:none;}
  .pin-input:focus-visible{outline:2px solid var(--red);outline-offset:2px;}
  .pin-input::placeholder{color:rgba(255,255,255,0.12);letter-spacing:2px;font-size:14px;}
  .pin-btn{width:100%;height:48px;padding:0 20px;background:var(--red);color:#fff;border:none;border-radius:3px;font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-family:var(--font);transition:background .2s,opacity .2s;}
  .pin-btn:hover{background:#b30000;}
  .pin-btn:active{opacity:.85;}
  .pin-btn:disabled{opacity:.6;cursor:default;}
  .pin-err{font-size:11px;color:#ff6b6b;margin-top:12px;min-height:16px;letter-spacing:0.3px;}
  .login-footer{position:relative;z-index:2;text-align:center;padding:20px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.12);}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-body">
    <div class="login-card">
      <div class="login-eyebrow">
        <img src="/hd-no-background.png" alt="HD Hauling &amp; Grading" class="login-logo-img"/>
      </div>
      <div class="login-sub">Internal use only &nbsp;&middot;&nbsp; Authorized access required</div>
      <div class="login-rule"></div>
      <label for="login-username" class="sr-only">Email or username</label>
      <input class="pin-input" id="login-username" type="text" placeholder="Email or username" autocomplete="username" spellcheck="false"/>
      <label for="pin-inp" class="sr-only">Password</label>
      <div style="position:relative;">
        <input class="pin-input" id="pin-inp" type="password" placeholder="Password" autocomplete="current-password" style="padding-right:44px;"/>
        <button type="button" id="pin-toggle" aria-label="Show password" aria-pressed="false" tabindex="0" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:transparent;border:0;color:rgba(255,255,255,.55);cursor:pointer;padding:6px;border-radius:4px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <button type="button" class="pin-btn" id="pin-submit">Access Tool</button>
      <div class="pin-err" id="pin-err" role="alert" aria-live="assertive"></div>
    </div>
  </div>
  <div class="login-footer">Confidential &nbsp;&middot;&nbsp; Not for distribution</div>
</div>
<script>
'use strict';

function togglePinVisibility(){
  var inp=document.getElementById('pin-inp');
  var btn=document.getElementById('pin-toggle');
  if(!inp||!btn)return;
  var showing=inp.type==='text';
  inp.type=showing?'password':'text';
  btn.setAttribute('aria-pressed', showing?'false':'true');
  btn.setAttribute('aria-label', showing?'Show password':'Hide password');
}

async function doLogin(){
  var errEl=document.getElementById('pin-err');
  if(errEl)errEl.textContent='';
  var identifier=(document.getElementById('login-username').value||'').trim().toLowerCase();
  var pin=document.getElementById('pin-inp').value||'';
  var btn=document.getElementById('pin-submit');
  function done(){if(btn){btn.disabled=false;btn.textContent='Access Tool';}}
  if(btn){btn.disabled=true;btn.textContent='Checking...';}
  if(!identifier){if(errEl)errEl.textContent='Please enter your email or username.';done();return;}
  if(!pin){if(errEl)errEl.textContent='Please enter your password.';done();return;}
  if(identifier.indexOf('@')>=0 && !/@hdgrading\.com$/.test(identifier)){
    if(errEl)errEl.textContent='Please use your @hdgrading.com email.';done();return;
  }
  try{
    var r=await fetch('/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:'same-origin',
      body:JSON.stringify({username:identifier,password:pin})
    });
    var d={};
    try{ d=await r.json(); }catch(_){}
    if(r.ok && d.ok){
      window.location.replace('/');
      return;
    }
    if(errEl)errEl.textContent=(d&&d.error)||'Incorrect email or password.';
    document.getElementById('pin-inp').value='';
  }catch(_){
    if(errEl)errEl.textContent='Connection error. Try again.';
  }
  finally{done();}
}

document.getElementById('pin-submit').addEventListener('click', doLogin);
document.getElementById('pin-toggle').addEventListener('click', togglePinVisibility);
['login-username','pin-inp'].forEach(function(id){
  var el=document.getElementById(id);
  if(el){el.addEventListener('keydown', function(ev){ if(ev.key==='Enter') doLogin(); });}
});

fetch('/auth/check', {credentials:'same-origin'})
  .then(function(r){return r.json();})
  .then(function(d){ if(d && d.authenticated){ window.location.replace('/'); } })
  .catch(function(){});

setTimeout(function(){ var u=document.getElementById('login-username'); if(u) u.focus(); }, 50);
</script>
</body>
</html>
